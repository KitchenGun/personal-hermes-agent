name: workout_automation_safeguards
description: "Model the approval and write-safety boundary for future workout scheduling automation."
schedule: manual
trigger:
  type: command
  commands:
    - "/workout confirm <token>"
    - "/workout deny <token>"
    - "확정"
    - "캘린더도 수정해라"
    - "토요일 에어소프트가 아닌 운동 루틴으로 교체"
    - "workout inbody + image attachment"
    - "workout log block format"
    - "workout append history"
    - "일반 운동 자연어 요청"
  timezone: "${HERMES_TIMEZONE}"
input:
  spreadsheet_url: "<YOUR_WORKOUT_SPREADSHEET_URL>"
  sheet_range: "<YOUR_WORKOUT_SHEET_RANGE>"
  calendar_id: "<YOUR_WORKOUT_CALENDAR_ID>"
  pending_plan_source: "<YOUR_PENDING_WORKOUT_PLAN_SOURCE>"
steps:
  - "Generate a pending workout plan with a high-entropy confirmation token."
  - "Ignore free-text approval such as ordinary yes/confirm messages."
  - "Accept only deterministic token commands: /workout confirm <token> or /workout deny <token>."
  - "Resolve Google Sheets gid through sheet metadata to a quoted A1 range."
  - "Fail closed when gid, sheet metadata, token, or pending plan state is missing."
  - "Refuse Google Calendar writes unless the pending plan is explicitly confirmed."
  - "If an already-calendarized draft is revised, set calendar_update_required and keep it actionable."
  - "Treat explicit calendar update phrases without `/workout confirm <token>` as natural language for the Hermes agent, not as Calendar write approval."
  - "Delete stale prior Hermes-marked workout events that are no longer present in the revised plan."
  - "For workout inbody image attachments, OCR the image through the Hermes vision path before appending to Sheets."
  - "For workout log, accept both one-line entries and block entries where an exercise name line is followed by metric-only set lines."
  - "Keep last_append for compatibility and maintain append_history for the latest manual workout sheet writes."
  - "Keep the workout Discord channel in free_response_channels and no_thread_channels so direct workout commands are handled without mentions."
  - "Keep deterministic parser handling minimal: workout log, workout inbody, confirm/deny token commands, and optional read-only recent/today/undo/help helpers."
  - "Rewrite all other pending-draft thread natural language to the Hermes agent with sanitized draft context and no token/secret/raw-path exposure."
  - "Before agent rewrite, read the latest workout log from Sheets in read-only mode and include recent 14-30 day records, latest date by body part, exercise/weight/reps/sets, this-week body-part balance, missing body parts, and over-repeated body parts."
  - "If the read-only latest-record lookup fails, state that failure in the agent context and tell the agent to propose only from the current draft."
  - "In the agent rewrite context, include original user text, pending draft summary, latest workout record summary, body-part balance analysis, and prohibit Calendar writes, Sheets writes, and free-text confirmation; ask questions when ambiguous and propose natural-language revisions when possible."
  - "Use deterministic Hermes event IDs plus hermes_marker and spec_hash for idempotent calendar upsert."
output:
  destination: "<YOUR_WORKOUT_REVIEW_CHANNEL>"
  format: markdown
tools:
  - sheets_read
  - calendar_write
  - notification_send
model: "${HERMES_REASONING_MODEL}"
safety:
  confirmation: "token-command-required"
  token_entropy: "128-bit-minimum"
  calendar_write: "confirmed-plan-only"
  idempotency: "deterministic-event-id-and-spec-hash"
  calendar_update_required: "set-on-revised-calendarized-draft-clear-after-apply"
  inbody_image: "vision-ocr-before-sheets-append"
  workout_log_block_format: "exercise-heading-plus-metric-lines"
  append_history: "last-append-compatible-recent-20"
  natural_language_revision: "agent-rewrite-with-sanitized-context"
  latest_record_context: "read-only-before-agent-rewrite; failure-disclosed"
  sheets_gid: "metadata-resolved-fail-closed"
  secrets: "do-not-include-google-or-discord-secrets"
status: enabled
